/* drag-drop handlers */
let libDragPayload = null;
function libDragStart(e, kind, id) {
  libDragPayload = { kind, id };
  e.dataTransfer.effectAllowed = 'move';
  // required for some browsers
  try { e.dataTransfer.setData('text/plain', kind+':'+id); } catch(err){}
}
function libDragOver(e, targetFolderId) {
  if (!libDragPayload) return;
  // can't drop onto itself or own descendant
  if (libDragPayload.kind === 'folder') {
    const desc = libDescendantFolderIds(libDragPayload.id);
    if (desc.has(targetFolderId)) return;
  }
  e.preventDefault();
  e.currentTarget.style.background = '#fff5e8';
}
function libDragLeave(e) {
  e.currentTarget.style.background = '';
}
function libDragOverRoot(e) {
  if (!libDragPayload) return;
  e.preventDefault();
  e.currentTarget.style.background = 'var(--beige)';
}
function libDragLeaveRoot(e) { e.currentTarget.style.background = ''; }
function libDrop(e, targetFolderId) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.style.background = '';
  if (!libDragPayload) return;
  if (libDragPayload.kind === 'file') {
    const f = state.libraryFiles.find(x => x.id === libDragPayload.id);
    if (f) f.folderId = targetFolderId;
    saveState();
    toast('File moved.');
  } else if (libDragPayload.kind === 'folder') {
    if (libDragPayload.id === targetFolderId) return;
    const desc = libDescendantFolderIds(libDragPayload.id);
    if (desc.has(targetFolderId)) { toast("Can't move a folder into itself."); return; }
    const f = state.libraryFolders.find(x => x.id === libDragPayload.id);
    if (f) f.parentId = targetFolderId;
    saveState();
    toast('Folder moved.');
  }
  libDragPayload = null;
  router('content-library');
}
function libDropOnRoot(e) {
  e.preventDefault();
  e.currentTarget.style.background = '';
  if (!libDragPayload) return;
  if (libDragPayload.kind === 'file') {
    const f = state.libraryFiles.find(x => x.id === libDragPayload.id);
    if (f) f.folderId = null;
  } else if (libDragPayload.kind === 'folder') {
    const f = state.libraryFolders.find(x => x.id === libDragPayload.id);
    if (f) f.parentId = null;
  }
  libDragPayload = null;
  saveState();
  router('content-library');
  toast('Moved to root.');
}
function fileIcon(type, name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  if (type && type.startsWith('image/')) return '&#127912;';
  if (ext === 'pdf') return '&#128196;';
  if (['doc','docx'].includes(ext)) return '&#128462;';
  if (['xls','xlsx','csv'].includes(ext)) return '&#128202;';
  if (['ppt','pptx'].includes(ext)) return '&#128240;';
  if (['mp3','wav','m4a'].includes(ext)) return '&#127925;';
  if (['mp4','mov','avi'].includes(ext)) return '&#127916;';
  return '&#128196;';
}
function formatBytes(b) {
  if (!b) return '0 B';
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/1024/1024).toFixed(2) + ' MB';
}
function openLibraryFolder(id) {
  currentFolder = id;
  router('content-library');
}
function newLibraryFolder() {
  const name = prompt('Folder name:');
  if (!name || !name.trim()) return;
  state.libraryFolders.push({ id: uid('f'), name: name.trim(), parentId: currentFolder, createdAt: new Date().toISOString().slice(0,10) });
  saveState();
  router('content-library');
  toast('Folder created.');
}
function renameFolder(id) {
  const f = state.libraryFolders.find(x => x.id === id);
  if (!f) return;
  const name = prompt('Rename folder:', f.name);
  if (!name || !name.trim()) return;
  f.name = name.trim();
  saveState();
  router('content-library');
}
function deleteFolder(id) {
  const desc = libDescendantFolderIds(id);
  const filesIn = state.libraryFiles.filter(f => desc.has(f.folderId)).length;
  const subCount = desc.size - 1;
  let msg = 'Delete this folder';
  if (subCount) msg += ` and its ${subCount} subfolder${subCount===1?'':'s'}`;
  if (filesIn) msg += `${subCount?' plus':' and its'} ${filesIn} file${filesIn===1?'':'s'}`;
  msg += '?';
  if (!confirm(msg)) return;
  state.libraryFolders = state.libraryFolders.filter(f => !desc.has(f.id));
  state.libraryFiles = state.libraryFiles.filter(f => !desc.has(f.folderId));
  saveState();
  router('content-library');
  toast('Folder deleted.');
}
function moveFolder(id) {
  const desc = libDescendantFolderIds(id);
  const opts = [{label:'(Root)', val:''}, ...state.libraryFolders.filter(f => !desc.has(f.id)).map(f => {
    const trail = libBreadcrumb(f.id);
    return { label: trail.map(t=>t.name).join(' / '), val: f.id };
  })];
  const choice = prompt('Move folder to:\n' + opts.map((o,i)=>`${i}. ${o.label}`).join('\n'), '0');
  const idx = parseInt(choice, 10);
  if (isNaN(idx) || !opts[idx]) return;
  const target = opts[idx].val || null;
  const f = state.libraryFolders.find(x => x.id === id);
  if (f) f.parentId = target;
  saveState();
  router('content-library');
  toast('Folder moved.');
}
function libraryUpload(e) {
  const files = Array.from(e.target.files || []);
  if (files.length === 0) return;
  let pending = files.length;
  files.forEach(f => {
    if (f.size > 5 * 1024 * 1024) {
      toast(`Skipped "${f.name}" — over 5 MB.`);
      pending--;
      if (pending === 0) finish();
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      state.libraryFiles.push({
        id: uid('lf'),
        folderId: currentFolder,
        name: f.name,
        type: f.type,
        size: f.size,
        dataUrl: reader.result,
        uploadedAt: new Date().toISOString().slice(0,10)
      });
      pending--;
      if (pending === 0) finish();
    };
    reader.readAsDataURL(f);
  });
  function finish() {
    try { saveState(); }
    catch(err) { toast('Storage full — file not saved.'); return; }
    e.target.value = '';
    router('content-library');
    toast('Files uploaded.');
  }
}
function deleteLibraryFile(id) {
  if (!confirm('Delete this file?')) return;
  state.libraryFiles = state.libraryFiles.filter(f => f.id !== id);
  saveState();
  router('content-library');
}
function moveFile(id) {
  const f = state.libraryFiles.find(x => x.id === id);
  if (!f) return;
  const opts = [{label:'(Root)', val:''}, ...state.libraryFolders.map(fo => {
    const trail = libBreadcrumb(fo.id);
    return { label: trail.map(t=>t.name).join(' / '), val: fo.id };
  })];
  const choice = prompt('Move to which folder?\n' + opts.map((o,i)=>`${i}. ${o.label}`).join('\n'), '0');
  const idx = parseInt(choice, 10);
  if (isNaN(idx) || !opts[idx]) return;
  f.folderId = opts[idx].val || null;
  saveState();
  router('content-library');
  toast('File moved.');
}

let activeChannel = null;
function renderSlack(el) {
  if (!activeChannel || !state.channels.find(c => c.id === activeChannel)) {
    activeChannel = state.channels[0]?.id || null;
  }
  const ch = state.channels.find(c => c.id === activeChannel);
  const msgs = state.messages
    .filter(m => m.channelId === activeChannel)
    .sort((a,b) => a.timestamp.localeCompare(b.timestamp));

  el.innerHTML = `
    <div class="chat-layout">
      <div class="channel-list">
        <div class="channel-list-header">
          <span>Channels</span>
          <button onclick="newChannel()">+</button>
        </div>
        ${state.channels.map(c => `
          <div class="channel-item ${c.id===activeChannel?'active':''}" onclick="setChannel('${c.id}')">
            <span># ${escapeHtml(c.name)}</span>
            <span class="ch-actions">
              <button class="ch-del" title="Rename channel" onclick="event.stopPropagation();renameChannel('${c.id}')">&#9998;</button>
              <button class="ch-del" title="Delete channel" onclick="event.stopPropagation();deleteChannel('${c.id}')">&times;</button>
            </span>
          </div>
        `).join('')}
      </div>
      <div class="chat-main">
        ${ch ? `
          <div class="chat-header">
            <h2># ${escapeHtml(ch.name)}</h2>
            <div class="desc">${escapeHtml(ch.description || '')}</div>
          </div>
          <div class="chat-messages" id="chatMsgs">
            ${msgs.length === 0 ? '<div class="empty">No messages yet. Be the first to say hi.</div>' :
              msgs.map(m => `
                <div class="chat-msg">
                  <div class="chat-avatar">${escapeHtml((m.author||'?').slice(0,1).toUpperCase())}</div>
                  <div class="chat-body">
                    <div class="chat-meta"><strong>${escapeHtml(m.author||'')}</strong> ${formatChatTime(m.timestamp)}</div>
                    ${m.text ? `<div class="chat-text">${escapeHtml(m.text)}</div>` : ''}
                    ${m.attachment ? `<a href="${m.attachment.dataUrl}" download="${escapeHtml(m.attachment.name)}" class="chat-attach">${attachIcon(m.attachment)} <span>${escapeHtml(m.attachment.name)}</span> <span style="color:var(--brown-light);font-size:11px">${formatBytes(m.attachment.size)}</span></a>` : ''}
                  </div>
                </div>
              `).join('')
            }
          </div>
          <div class="chat-input-wrap">
            <div id="chatAttachInfo" class="chat-attach-preview" style="display:none"></div>
            <div class="chat-input">
              <input type="file" id="chatFileInput" style="display:none" onchange="chatFileSelected(event)" />
              <button class="btn btn-icon" title="Attach file" onclick="chatFilePick()" style="height:40px">&#128206;</button>
              <textarea id="chatInput" placeholder="Message # ${escapeHtml(ch.name)}..." onkeydown="chatKey(event)"></textarea>
              <button class="btn" onclick="sendMessage()">Send</button>
            </div>
          </div>
        ` : '<div class="empty">No channels. Create one to start chatting.</div>'}
      </div>
    </div>
  `;
  // scroll to bottom
  setTimeout(() => {
    const mc = document.getElementById('chatMsgs');
    if (mc) mc.scrollTop = mc.scrollHeight;
  }, 10);
}
function formatChatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const today = new Date();
  const sameDay = d.toDateString() === today.toDateString();
  const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  if (sameDay) return time;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + time;
}
function setChannel(id) {
  activeChannel = id;
  renderSlack(document.getElementById('content'));
}
function newChannel() {
  const name = prompt('Channel name (no spaces):');
  if (!name || !name.trim()) return;
  const desc = prompt('Channel description (optional):') || '';
  const id = uid('ch');
  state.channels.push({ id, name: name.trim().toLowerCase().replace(/\s+/g,'-'), description: desc, createdAt: new Date().toISOString().slice(0,10) });
  activeChannel = id;
  saveState();
  renderSlack(document.getElementById('content'));
}
function deleteChannel(id) {
  if (!confirm('Delete this channel and all of its messages?')) return;
  state.channels = state.channels.filter(c => c.id !== id);
  state.messages = state.messages.filter(m => m.channelId !== id);
  if (activeChannel === id) activeChannel = state.channels[0]?.id || null;
  saveState();
  renderSlack(document.getElementById('content'));
}
function renameChannel(id) {
  const ch = state.channels.find(c => c.id === id);
  if (!ch) return;
  const name = prompt('Rename channel:', ch.name);
  if (!name || !name.trim()) return;
  ch.name = name.trim().toLowerCase().replace(/\s+/g, '-');
  const desc = prompt('Channel description (optional):', ch.description || '');
  if (desc !== null) ch.description = desc;
  saveState();
  renderSlack(document.getElementById('content'));
  toast('Channel updated.');
}

let pendingChatAttachment = null;
function chatFilePick() {
  document.getElementById('chatFileInput').click();
}
function chatFileSelected(e) {
  const f = e.target.files[0];
  if (!f) return;
  if (f.size > 5 * 1024 * 1024) { toast('File too large (max 5 MB).'); e.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = () => {
    pendingChatAttachment = { name: f.name, type: f.type, size: f.size, dataUrl: reader.result };
    const info = document.getElementById('chatAttachInfo');
    if (info) {
      info.style.display = 'flex';
      info.innerHTML = `<span>&#128206; ${escapeHtml(f.name)} (${formatBytes(f.size)})</span><button onclick="clearChatAttachment()" style="background:transparent;border:none;color:var(--danger);cursor:pointer;font-size:14px">&times;</button>`;
    }
  };
  reader.readAsDataURL(f);
}
function clearChatAttachment() {
  pendingChatAttachment = null;
  const fi = document.getElementById('chatFileInput');
  if (fi) fi.value = '';
  const info = document.getElementById('chatAttachInfo');
  if (info) { info.style.display = 'none'; info.innerHTML = ''; }
}
function sendMessage() {
  const ta = document.getElementById('chatInput');
  const txt = ta.value.trim();
  if (!txt && !pendingChatAttachment) return;
  const msg = {
    id: uid('m'),
    channelId: activeChannel,
    author: 'Henry',
    text: txt,
    timestamp: new Date().toISOString()
  };
  if (pendingChatAttachment) msg.attachment = pendingChatAttachment;
  state.messages.push(msg);
  ta.value = '';
  pendingChatAttachment = null;
  try { saveState(); }
  catch(err) { toast('Storage full — message not saved.'); state.messages.pop(); return; }
  renderSlack(document.getElementById('content'));
}
function attachIcon(att) {
  if (att && att.type && att.type.startsWith('image/')) return '&#127912;';
  return '&#128206;';
}
function chatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

  const data = {
    id,
    date: document.getElementById('rc_date').value,
    lot: document.getElementById('rc_lot').value,
    productId: document.getElementById('rc_product').value,
    distributionTrace: document.getElementById('rc_dist').value,
    timeMinutes: parseInt(document.getElementById('rc_time').value, 10) || 0,
    result: document.getElementById('rc_result').value
  };
  if (isNew) state.recalls.push(data);
  else Object.assign(state.recalls.find(r=>r.id===id), data);
  saveState();
  closeModal();
  renderFoodSafety(document.getElementById('content'));
}
function deleteRecall(id) {
  if (!confirm('Delete this mock recall record?')) return;
  state.recalls = state.recalls.filter(r => r.id !== id);
  saveState();
  renderFoodSafety(document.getElementById('content'));
}

/* =========================================================================
   INIT
   ========================================================================= */
window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
router('dashboard');
</script>
